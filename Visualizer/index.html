<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đường nào ngắn nhất? — Visualizer</title>
    <link rel="stylesheet" href="./styles/fonts.css" />
    <link rel="stylesheet" href="./styles/tokens.css" />
    <link rel="stylesheet" href="./styles/base.css" />
    <link rel="stylesheet" href="./styles/chrome.css" />
    <link rel="stylesheet" href="./styles/stage.css" />
    <link rel="stylesheet" href="./styles/panels.css" />
    <link rel="stylesheet" href="./styles/intro.css" />
  </head>
  <body>
    <div class="app" id="app">
      <!-- Sân khấu -->
      <section class="stage" aria-label="Sân khấu minh họa">
        <svg id="stageSvg" class="stage-svg" viewBox="0 0 1000 640" role="img" aria-label="Đồ thị minh họa các tuyến đường">
          <g id="cameraLayer">
            <g id="edgeLayer"></g>
            <g id="routeLayer"></g>
            <g id="edgeLabelLayer"></g>
            <g id="nodeLayer"></g>
            <g id="badgeLayer"></g>
          </g>
          <g id="annotationLayer"></g>
        </svg>
        <div class="stage-float" id="stageFloat"></div>
      </section>

      <!-- Đầu trang: tiêu đề scene + chuyển phần -->
      <header class="head">
        <div class="scene-heading">
          <p class="kicker"><span class="part-no" id="partNo">Phần 1</span><span id="sceneKicker"></span></p>
          <h1 class="scene-title" id="sceneTitle"></h1>
        </div>
        <nav class="part-switcher" id="partSwitcher" aria-label="Chọn phần"></nav>
      </header>

      <!-- Số liệu minh họa (không aria-live: cập nhật quá dày khi animation chạy) -->
      <div class="metrics is-empty" id="metrics"></div>

      <!-- Dải dưới: lời dẫn — điều khiển — ý chính -->
      <div class="bottom-band">
        <aside class="caption" id="caption">
          <p class="caption-body" id="captionBody"></p>
        </aside>

        <footer class="controls" aria-label="Điều khiển trình chiếu">
          <button class="ctrl-btn" id="prevBtn" type="button">&larr; Lùi</button>
          <div class="scene-dots" id="sceneDots"></div>
          <button class="ctrl-btn is-primary" id="nextBtn" type="button">Tiếp &rarr;</button>
          <button class="ctrl-btn is-icon" id="replayBtn" type="button" title="Chạy lại cảnh (R)" aria-label="Chạy lại cảnh">&#8635;</button>
          <button class="ctrl-btn is-icon" id="pauseBtn" type="button" title="Tạm dừng (P)" aria-pressed="false" aria-label="Tạm dừng">&#10073;&#10073;</button>
        </footer>

        <aside class="notes" id="notes">
          <h2 class="notes-title" id="notesTitle"></h2>
          <ul class="notes-list" id="notesList"></ul>
        </aside>
      </div>

      <div class="pause-flag" aria-hidden="true">Tạm dừng</div>
    </div>

    <!-- Intro deck (overlay, dựng bởi js/intro.js) -->
    <div id="introRoot"></div>

    <script src="./vendor/gsap.min.js"></script>
    <script src="./js/data.js"></script>
    <script src="./js/stage.js"></script>
    <script src="./js/fx.js"></script>
    <script src="./js/part1.js"></script>
    <script src="./js/part2.js"></script>
    <script src="./js/part3.js"></script>
    <script src="./js/part4.js"></script>
    <script src="./js/intro.js"></script>
    <script src="./js/engine.js"></script>
  </body>
</html>
